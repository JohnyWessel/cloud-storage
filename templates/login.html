<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — Моё облако</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .login-card .card-body { padding: 2.5rem; }
        .cloud-icon { font-size: 3rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="card login-card" style="width: 380px;">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="cloud-icon">☁️</div>
                <h4 class="mt-2 fw-bold">Моё облако</h4>
                <p class="text-muted small">Введите учётные данные для входа</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 text-center small">{{ error }}</div>
            {% endif %}

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Логин</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="admin или user" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Пароль</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    Войти →
                </button>
            </form>
        </div>
    </div>
</body>
</html>
