<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Локальное облако</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1 class="mb-4">📂 Мое облако</h1>

    <!-- Форма загрузки -->
    <form action="/upload" method="post" enctype="multipart/form-data" class="mb-5 row g-2">
        <div class="col-auto">
            <input type="file" name="file" class="form-control" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Загрузить</button>
        </div>
    </form>

    <!-- Таблица файлов -->
    {% if files %}
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Имя файла</th>
                    <th>Размер</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for file in files %}
                <tr>
                    <td>{{ file.name }}</td>
                    <td>{{ file.size_human }}</td>
                    <td>
                        <a href="/download/{{ file.name }}" class="btn btn-sm btn-success">Скачать</a>
                        <form action="/delete/{{ file.name }}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Удалить {{ file.name }}?')">
                                Удалить
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <div class="alert alert-info">Файлов пока нет. Загрузите первый файл.</div>
    {% endif %}
</body>
</html>
